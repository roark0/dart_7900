extends: lib/generated/lj_qc/main.dsl.yaml
source:
  image: images/LJ_QC/LJ_QC.png
shell:
  side_nav:
    selected: L-J QC Settings
  status_bar:
    clock_source: system
body:
  sections:
  - id: lj_qc_side_state
    selected: L-J QC Settings
  - type: form_grid
    id: qc_settings_header
    columns: 3
    rows:
    - - file_no
      - lot_no
      - exp_date
    - - file_name
      - qc_level
      - mode
    - - set_by
      - date_created
      - qc_no
    fields:
      file_no:
        label: FileNo.
        value: '1'
        control: select
      lot_no:
        label: LotNo.
        value: ''
        control: readonly
      exp_date:
        label: Exp.Date
        value: 2026-03-18
        control: select
      file_name:
        label: FileName
        value: ''
        control: readonly
      qc_level:
        label: QC Level
        value: M
        control: select
      mode:
        label: Mode
        value: Whole blood
        control: select
      set_by:
        label: Set By
        value: Engineer
        control: readonly
      date_created:
        label: Date Created
        value: 2026-03-18
        control: readonly
      qc_no:
        label: QCNo.
        value: ''
        control: readonly
