extends: lib/generated/templates/app_shell_base.dsl.yaml
source:
  images:
  - images/LJ_QC/LJ_QC.png
  - images/LJ_QC/LJ_QC_2.png
  - images/LJ_QC/LJ_QC_3.png
  - images/LJ_QC/LJ_QC_4.png
  grouping: lj_qc
page:
  id: lj_qc_main
  template: qc_panel
  size: 800x600
  output: lib/src/features/lj_qc/lj_qc_main.dart
shell:
  top_nav:
    selected: L-J QC
  side_nav:
    selected: L-J QC Settings
    items:
    - text: L-J QC Settings
      target:
        page: lj_qc_main
        file: lib/generated/lj_qc/settings.dsl.yaml
        state: settings
    - text: L-J QC Analyse
      target:
        page: lj_qc_main
        file: lib/generated/lj_qc/analyse.dsl.yaml
        state: analyse
    - text: L-J QC Graph
      target:
        page: lj_qc_main
        file: lib/generated/lj_qc/graph.dsl.yaml
        state: graph
    - text: L-J QC list
      target:
        page: lj_qc_main
        file: lib/generated/lj_qc/list.dsl.yaml
        state: list
  status_bar:
    left: Engineer
    center: LIS
    clock_source: system
    indicator: green
body:
  sections: []
