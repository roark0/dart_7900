extends: lib/generated/templates/app_shell_base.dsl.yaml
source:
  images:
  - images/Menu/Menu_0.png
  - images/Menu/Menu_1.png
  - images/Menu/Menu_2.png
  - images/Menu/Menu_3.png
  - images/Menu/Menu_4.png
  - images/Menu/Menu_5.png
  - images/Menu/Menu_6.png
  - images/Menu/Menu_7.png
  grouping: menu_overlay
page:
  id: menu_overlay
  template: menu_overlay
  size: 800x600
  output: lib/generated/menu_overlay.dart
shell:
  top_nav:
    selected: Analysis
  status_bar:
    right: 2026-03-25 08:04:53
body:
  sections:
  - type: action_row
    id: main_menu
    selected: Analysis
    items:
    - text: Analysis
      variant: secondary
      disabled: false
      target:
        module: analysis
        page: analysis_main
    - text: List Review
      variant: secondary
      disabled: false
      target:
        module: list_review
        page: list_review_main
    - text: QC
      variant: secondary
      disabled: false
      target:
        page: menu_qc
        state: lj_qc_setting
    - text: Calibration
      variant: secondary
      disabled: false
      target:
        page: menu_calibration
        state: factors
    - text: Service
      variant: secondary
      disabled: false
      target:
        page: maintenance_daily
        state: whole_machine_maintenance
    - text: System settings
      variant: secondary
      disabled: false
      target:
        page: menu_system_settings
        state: reference_range
    - text: Shutdown
      variant: secondary
      disabled: false
      target:
        action: shutdown
  - type: form_grid
    id: analysis_summary_header
    columns: 3
    rows:
    - - name
      - mode
      - age
    fields:
      name:
        label: Name
        value: ''
        control: readonly
      mode:
        label: Mode
        value: Whole blood
        control: select
      age:
        label: Age
        value: ''
        control: readonly
  - type: triplet_table
    id: analysis_summary_table
    groups:
    - - Result
      - Unit
      - ''
    - - Result
      - Unit
      - ''
    - - Result
      - Unit
      - WBC Flag
    rows:
    - - PLT
      - ''
      - ''
      - PLT
      - ''
      - ''
      - WBC Flag
      - ''
      - ''
    - - P-LCR
      - ''
      - ''
      - P-LCC
      - ''
      - ''
      - ''
      - ''
      - ''
    - - PDW-CV
      - ''
      - ''
      - PDW-SD
      - ''
      - ''
      - ''
      - ''
      - ''
    - - PCT
      - ''
      - ''
      - MPV
      - ''
      - ''
      - ''
      - ''
      - ''
    zebra: true
    dense: true
  - type: chart_row
    id: analysis_summary_charts
    items:
    - title: RBC
      kind: histogram
      x_axis: ''
      y_axis: false
    - title: PLT
      kind: histogram
      x_axis: ''
      y_axis: false
  - type: action_row
    id: analysis_actions
    align: center
    items:
    - text: Next sample
      variant: primary
      disabled: false
      target:
        action: next_sample
    - text: Mode
      variant: primary
      disabled: false
      target:
        action: change_mode
    - text: Retest
      variant: primary
      disabled: false
      target:
        action: retest
    - text: Verify
      variant: primary
      disabled: false
      target:
        action: verify
    - text: Start test
      variant: primary
      disabled: false
      target:
        action: start_test
states:
