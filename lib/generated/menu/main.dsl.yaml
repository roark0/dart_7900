extends: lib/generated/templates/app_shell_base.dsl.yaml

source:
  images:
    - images/Menu/Menu_0.png
    - images/Menu/Menu_1.png
    - images/Menu/Menu_2.png
    - images/Menu/Menu_3.png
    - images/Menu/Menu_4.png
    - images/Menu/Menu_5.png
    - images/Menu/Menu_6.png
    - images/Menu/Menu_7.png
  grouping: menu_overlay

page:
  id: menu_overlay
  template: menu_overlay
  size: 800x600
  output: lib/generated/menu_overlay.dart

shell:
  top_nav:
    selected: Analysis
  status_bar:
    right: 2026-03-25 08:04:53

body:
  sections:
    - type: action_row
      id: main_menu
      selected: Analysis
      items:
        - {text: Analysis, variant: secondary, disabled: false}
        - {text: List Review, variant: secondary, disabled: false}
        - {text: QC, variant: secondary, disabled: false}
        - {text: Calibration, variant: secondary, disabled: false}
        - {text: Service, variant: secondary, disabled: false}
        - {text: System settings, variant: secondary, disabled: false}
        - {text: Shutdown, variant: secondary, disabled: false}
    - type: form_grid
      id: analysis_summary_header
      columns: 3
      rows:
        - [name, mode, age]
      fields:
        name: {label: Name, value: "", control: readonly}
        mode: {label: Mode, value: Whole blood, control: select}
        age: {label: Age, value: "", control: readonly}
    - type: triplet_table
      id: analysis_summary_table
      groups:
        - [Result, Unit, ""]
        - [Result, Unit, ""]
        - [Result, Unit, WBC Flag]
      rows:
        - [PLT, "", "", PLT, "", "", WBC Flag, "", ""]
        - [P-LCR, "", "", P-LCC, "", "", "", "", ""]
        - [PDW-CV, "", "", PDW-SD, "", "", "", "", ""]
        - [PCT, "", "", MPV, "", "", "", "", ""]
      zebra: true
      dense: true
    - type: chart_row
      id: analysis_summary_charts
      items:
        - {title: RBC, kind: histogram, x_axis: "", y_axis: false}
        - {title: PLT, kind: histogram, x_axis: "", y_axis: false}
    - type: action_row
      id: analysis_actions
      align: center
      items:
        - {text: Next sample, variant: primary, disabled: false}
        - {text: Mode, variant: primary, disabled: false}
        - {text: Retest, variant: primary, disabled: false}
        - {text: Verify, variant: primary, disabled: false}
        - {text: Start test, variant: primary, disabled: false}

states:
  menu_open:
    source:
      image: images/Menu/Menu_0.png
    shell:
      status_bar:
        right: 2026-03-25 08:04:53
    body:
      sections:
        - id: main_menu
          selected: Analysis
  analysis:
    source:
      image: images/Menu/Menu_1.png
    shell:
      status_bar:
        right: 2026-03-25 08:10:13
    body:
      sections:
        - id: main_menu
          selected: Analysis
  list_review:
    source:
      image: images/Menu/Menu_2.png
    shell:
      status_bar:
        right: 2026-03-25 08:10:54
    body:
      sections:
        - id: main_menu
          selected: List Review
  qc:
    source:
      image: images/Menu/Menu_3.png
    shell:
      status_bar:
        right: 2026-03-25 08:11:23
    body:
      sections:
        - id: main_menu
          selected: QC
  calibration:
    source:
      image: images/Menu/Menu_4.png
    shell:
      status_bar:
        right: 2026-03-25 08:11:41
    body:
      sections:
        - id: main_menu
          selected: Calibration
  service:
    source:
      image: images/Menu/Menu_5.png
    shell:
      status_bar:
        right: 2026-03-25 08:12:05
    body:
      sections:
        - id: main_menu
          selected: Service
  system_settings:
    source:
      image: images/Menu/Menu_6.png
    shell:
      status_bar:
        right: 2026-03-25 08:12:34
    body:
      sections:
        - id: main_menu
          selected: System settings
  shutdown:
    source:
      image: images/Menu/Menu_7.png
    shell:
      status_bar:
        right: 2026-03-25 08:12:54
    body:
      sections:
        - id: main_menu
          selected: Shutdown
