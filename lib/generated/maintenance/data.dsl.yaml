extends: lib/generated/maintenance/main.dsl.yaml
source:
  images:
  - images/Maintenance/Maintenance_2_1.png
  grouping: data
page:
  id: maintenance_data
  output: lib/src/features/maintenance/data.dart
shell:
  side_nav:
    selected: Data maintenance
  status_bar:
    clock_source: system
body:
  sections:
  - type: action_row
    id: system_data_actions
    title: System data
    align: center
    items:
    - text: Backup
      variant: primary
      disabled: false
    - text: Recover
      variant: primary
      disabled: false
  - type: action_row
    id: config_parameter_actions
    title: Configure parameters
    align: center
    items:
    - text: Export
      variant: primary
      disabled: false
    - text: Import
      variant: primary
      disabled: false
  - type: cleanup_panel
    id: data_cleanup
    title: Data cleanup
    selectedOption: List review
    options:
    - List review
    - Quality control data
    - Log
    - All data
    action:
      text: Delete
      variant: primary
      disabled: false
