extends: lib/generated/maintenance/main.dsl.yaml
source:
  images:
  - images/Maintenance/Maintenance_6_1.png
  grouping: status
page:
  id: maintenance_status
  output: lib/src/features/maintenance/status.dart
shell:
  side_nav:
    selected: Status information
  status_bar:
    clock_source: system
body:
  layout:
    type: panel_grid
    gap: 8
    slots:
      top_left:
        width_ratio: 0.5
      top_right:
        width_ratio: 0.5
      bottom_left:
        width_ratio: 0.5
      bottom_right:
        width_ratio: 0.5
  sections:
  - type: matrix_table
    id: pressure_table
    slot: top_left
    title: Pressure
    groups:
    - - ''
      - KPa
      - Range
    rows:
    - - Vacuum
      - ''
      - ''
    zebra: true
    dense: true
  - type: matrix_table
    id: sensor_table
    slot: top_right
    title: Sensor
    groups:
    - - Device components
      - Status
    rows:
    - - Waste floater sensor
      - ''
    - - Sampling probe horizontal...
      - ''
    - - Sampling probe vertical ...
      - ''
    - - Sample syringe opticalco...
      - ''
    - - Aspiration key
      - ''
    zebra: true
    dense: true
  - type: matrix_table
    id: ad_table
    slot: bottom_left
    title: AD
    groups:
    - - ''
      - AD
      - Range
    rows:
    - - HGB
      - ''
      - ''
    zebra: true
    dense: true
