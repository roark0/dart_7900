extends: lib/generated/maintenance/main.dsl.yaml
source:
  images:
  - images/Maintenance/Maintenance_4_1.png
  grouping: statistics
page:
  id: maintenance_statistics
  output: lib/src/features/maintenance/statistics.dart
shell:
  side_nav:
    selected: Statistics
  status_bar:
    clock_source: system
body:
  layout:
    type: statistics_rows
    padding:
      left: 22
      top: 52
      right: 22
      bottom: 20
    label_column_width: 245
    value_field_width: 150
    action_column_width: 128
    row_gap: 12
    value_to_action_gap: 70
  sections:
  - type: stats_row
    id: sample_testing
    label: Sample testing times
    value: '0'
    action:
      text: Details
      variant: primary
      disabled: false
  - type: stats_row
    id: quality_control_testing
    label: "Quality control testing\nTimes"
    value: '0'
    action:
      text: Details
      variant: primary
      disabled: false
  - type: stats_row
    id: automatic_calibration_test
    label: "Automatic calibration\nTest times"
    value: '0'
    action:
      text: Details
      variant: primary
      disabled: false
  - type: stats_row
    id: blank_testing
    label: Blank testing  times
    value: '0'
  - type: action_button
    id: reset_statistics
    align: left
    offset_left: 223
    text: Reset
    variant: primary
    disabled: false
