source:
  image: images/XR_QC/XR_QC_1.png
shell:
  side_nav:
    selected: X-R QC Setting
  status_bar:
    right: '2026-03-25 12:42:37'
body:
  sections:
  - id: xr_qc_side_state
    selected: X-R QC Setting
  - type: form_grid
    id: xr_qc_settings_header
    columns: 4
    rows:
    - - file_no
      - qc_name
      - lot_no
      - exp_date
    - - qc_level
      - mode
      - set_by
      - date_created
    fields:
      file_no:
        label: FileNo.
        value: '1'
        control: select
      qc_name:
        label: QC Name
        value: ''
        control: readonly
      lot_no:
        label: LotNo.
        value: ''
        control: readonly
      exp_date:
        label: Exp.date
        value: '2026-03-25'
        control: select
      qc_level:
        label: QC Level
        value: H
        control: select
      mode:
        label: Mode
        value: Whole blood
        control: select
      set_by:
        label: Set by
        value: Engineer
        control: readonly
      date_created:
        label: Date Created
        value: '2026-03-25'
        control: readonly
actions:
  bottom:
    align: center
    items:
    - text: Save
      variant: primary
      disabled: false
      target:
        action: save
