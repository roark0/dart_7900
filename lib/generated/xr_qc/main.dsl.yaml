extends: lib/generated/templates/app_shell_base.dsl.yaml
source:
  images:
  - images/XR_QC/XR_QC_1.png
  - images/XR_QC/XR_QC_2.png
  - images/XR_QC/XR_QC_3.png
  - images/XR_QC/XR_QC_4.png
  grouping: xr_qc
page:
  id: xr_qc_main
  template: qc_panel
  size: 800x600
  output: lib/src/features/xr_qc/xr_qc_main.dart
shell:
  top_nav:
    selected: Menu
  side_nav:
    selected: X-R QC Setting
    items:
    - text: X-R QC Setting
      target:
        page: xr_qc_main
        file: lib/generated/xr_qc/settings.dsl.yaml
        state: settings
    - text: X-R QC Analyse
      target:
        page: xr_qc_main
        file: lib/generated/xr_qc/analyse.dsl.yaml
        state: analyse
    - text: X-R QC Graph
      target:
        page: xr_qc_main
        file: lib/generated/xr_qc/graph.dsl.yaml
        state: graph
    - text: X-R QC List
      target:
        page: xr_qc_main
        file: lib/generated/xr_qc/list.dsl.yaml
        state: list
  status_bar:
    left: Engineer
    center: LIS
    clock_source: system
    indicator: green
body:
  sections: []
