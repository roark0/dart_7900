extends: lib/generated/templates/app_shell_base.dsl.yaml
source:
  images:
  - images/XB_QC/XB_QC_1.png
  - images/XB_QC/XB_QC_2.png
  - images/XB_QC/XB_QC_3.png
  grouping: xb_qc
page:
  id: xb_qc_main
  template: qc_panel
  size: 800x600
  output: lib/src/features/xb_qc/xb_qc_main.dart
shell:
  top_nav:
    selected: Menu
  side_nav:
    selected: X-B QC Setting
    items:
    - text: X-B QC Setting
      target:
        page: xb_qc_main
        file: lib/generated/xb_qc/settings.dsl.yaml
        state: settings
    - text: X-B QC Graph
      target:
        page: xb_qc_main
        file: lib/generated/xb_qc/graph.dsl.yaml
        state: graph
    - text: X-B QC List
      target:
        page: xb_qc_main
        file: lib/generated/xb_qc/list.dsl.yaml
        state: list
  status_bar:
    left: Engineer
    center: LIS
    clock_source: system
    indicator: green
body:
  sections: []
