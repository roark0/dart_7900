extends: lib/generated/xb_qc/main.dsl.yaml
source:
  image: images/XB_QC/XB_QC_2.png
shell:
  side_nav:
    selected: X-B QC Graph
  status_bar:
    clock_source: system
body:
  sections:
  - id: xb_qc_side_state
    selected: X-B QC Graph
  - type: form_grid
    id: xb_qc_graph_header
    columns: 4
    rows:
    - - location
      - set_by
      - date_created
      - blank
    fields:
      location:
        label: Location/
        value: 0/0
        control: readonly
      set_by:
        label: Set by
        value: Admin
        control: readonly
      date_created:
        label: Date Created
        value: ''
        control: readonly
      blank:
        label: ''
        value: ''
        control: readonly
  - type: stats_panel
    id: xb_qc_graph_panels
    items:
    - MCHC
    - MCH
    - MCV
    - Mean
    - SD
    - CV%
actions:
  bottom:
    align: center
    items:
    - text: ←
      variant: primary
      disabled: false
      target:
        action: previous_item
    - text: →
      variant: primary
      disabled: false
      target:
        action: next_item
