extends: lib/generated/xb_qc/main.dsl.yaml
source:
  image: images/XB_QC/XB_QC_1.png
shell:
  side_nav:
    selected: X-B QC Setting
  status_bar:
    clock_source: system
body:
  sections:
  - id: xb_qc_side_state
    selected: X-B QC Setting
  - type: form_grid
    id: xb_qc_settings_header
    columns: 4
    rows:
    - - counts_group
      - range_hint
      - analyse_label
      - analyse_switch
    - - set_by
      - set_by_value
      - date_created
      - date_created_value
    fields:
      counts_group:
        label: Counts/Group
        value: '20'
        control: input
      range_hint:
        label: (20-200)
        value: ''
        control: readonly
      analyse_label:
        label: X-B QC Analyse
        value: ''
        control: readonly
      analyse_switch:
        label: ''
        value: Open / Close
        control: readonly
      set_by:
        label: Set by
        value: Admin
        control: readonly
      set_by_value:
        label: ''
        value: ''
        control: readonly
      date_created:
        label: Date Created
        value: '2021-07-02'
        control: readonly
      date_created_value:
        label: ''
        value: ''
        control: readonly
  - type: matrix_table
    id: xb_qc_settings_table
    title: Item Set
    groups:
    - - Item
      - Target
      - Limit
      - Unit
    rows:
    - - MCHC
      - '344'
      - '30'
      - g/L
    - - MCH
      - '29'
      - '2'
      - pg
    - - MCV
      - '84'
      - '6'
      - fL
    zebra: false
    dense: false
actions:
  bottom:
    align: center
    items:
    - text: Save
      variant: primary
      disabled: false
      target:
        action: save
    - text: Set Default
      variant: primary
      disabled: false
      target:
        action: set_default
